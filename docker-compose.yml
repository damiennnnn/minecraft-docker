services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    networks:
      - dokploy-network
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "8192M"
      USE_AIKAR_FLAGS: "true"
      VIEW_DISTANCE: "12"
    volumes:
      - data:/data

volumes:
  data:

networks:
  dokploy-network:
    external: true
