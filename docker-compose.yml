services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    expose:
      - 25565
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "8192M"
      USE_AIKAR_FLAGS: "true"
      VIEW_DISTANCE: "12"
    volumes:
      - data:/data
    deploy:
      labels:
      - traefik.http.routers.game-hosting-minecraft-qmxeih-9-web.entrypoints=mc
volumes:
  data:
